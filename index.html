<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Poetry - A Hypertext Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Beach Scene Container */
        .scene-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, 
                #87CEEB 0%, 
                #87CEEB 60%, 
                #F4A460 60%, 
                #F4A460 75%,
                #C2B280 75%,
                #C2B280 100%);
            transition: opacity 0.5s ease;
        }

        /* Sky elements */
        .sun {
            position: absolute;
            top: 10%;
            right: 15%;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
        }

        .sun:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.9);
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .cloud:hover {
            transform: translateY(-5px);
        }

        .cloud1 {
            top: 15%;
            left: 20%;
            width: 100px;
            height: 40px;
        }

        .cloud1::before,
        .cloud1::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud1::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }

        .cloud1::after {
            width: 60px;
            height: 60px;
            top: -30px;
            right: 10px;
        }

        /* Ocean */
        .ocean {
            position: absolute;
            bottom: 25%;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #4A90E2, #2E5C8A);
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .ocean:hover {
            opacity: 0.9;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 30px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100"><path d="M0,50 Q300,20 600,50 T1200,50 L1200,100 L0,100 Z" fill="%23ffffff" opacity="0.3"/></svg>');
            background-size: 50% 100%;
            animation: wave 8s linear infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Beach elements */
        .palm-tree {
            position: absolute;
            bottom: 20%;
            left: 10%;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .palm-tree:hover {
            transform: scale(1.05);
        }

        .trunk {
            width: 20px;
            height: 120px;
            background: #8B4513;
            border-radius: 10px;
            margin-left: 40px;
        }

        .leaves {
            width: 100px;
            height: 100px;
            position: relative;
        }

        .leaf {
            position: absolute;
            width: 60px;
            height: 30px;
            background: #228B22;
            border-radius: 50%;
            transform-origin: right center;
        }

        .leaf:nth-child(1) { transform: rotate(-45deg); top: 20px; left: 0; }
        .leaf:nth-child(2) { transform: rotate(-15deg); top: 10px; left: 15px; }
        .leaf:nth-child(3) { transform: rotate(15deg); top: 10px; left: 25px; }
        .leaf:nth-child(4) { transform: rotate(45deg); top: 20px; left: 40px; }

        .seashell {
            position: absolute;
            bottom: 28%;
            left: 45%;
            width: 40px;
            height: 35px;
            background: #FFE4E1;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .seashell:hover {
            transform: rotate(15deg) scale(1.2);
        }

        .sandcastle {
            position: absolute;
            bottom: 28%;
            right: 20%;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .sandcastle:hover {
            transform: scale(1.1);
        }

        .castle-tower {
            width: 60px;
            height: 80px;
            background: #DEB887;
            border-radius: 5px 5px 0 0;
            position: relative;
            margin: 0 auto;
        }

        .castle-top {
            width: 70px;
            height: 20px;
            background: #D2691E;
            position: absolute;
            top: -10px;
            left: -5px;
            clip-path: polygon(0 100%, 20% 0, 40% 100%, 60% 0, 80% 100%, 100% 0, 100% 100%);
        }

        .boat {
            position: absolute;
            bottom: 45%;
            right: 30%;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .boat:hover {
            transform: translateY(-5px);
        }

        .boat-body {
            width: 80px;
            height: 30px;
            background: #8B4513;
            border-radius: 0 0 40px 40px;
        }

        .sail {
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 60px solid white;
            position: absolute;
            bottom: 30px;
            left: 20px;
        }

        .bird {
            position: absolute;
            top: 25%;
            right: 40%;
            cursor: pointer;
            animation: fly 6s ease-in-out infinite;
        }

        .bird:hover {
            animation-play-state: paused;
        }

        @keyframes fly {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(100px, -30px); }
        }

        .bird-shape {
            width: 40px;
            height: 3px;
            background: #333;
            border-radius: 50%;
            position: relative;
        }

        .bird-shape::before,
        .bird-shape::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 3px;
            background: #333;
            border-radius: 50%;
        }

        .bird-shape::before {
            transform: rotate(-30deg);
            left: -15px;
        }

        .bird-shape::after {
            transform: rotate(30deg);
            right: -15px;
        }

        /* Poetry Panel */
        .poetry-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .poetry-content {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 50px;
            border-radius: 15px;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            color: #fff;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .poetry-content h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #FFD700;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .poetry-content p {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 15px;
            text-align: justify;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            background: none;
            border: none;
            color: #FFD700;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .close-btn:hover {
            transform: rotate(90deg);
            color: #FFA500;
        }

        /* Twine-style passage links */
        .passage-link {
            color: #87CEEB;
            text-decoration: none;
            border-bottom: 1px dotted #87CEEB;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .passage-link:hover {
            color: #FFD700;
            border-bottom-color: #FFD700;
        }

        /* Info tooltip */
        .info-box {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            max-width: 300px;
        }

        .info-box h3 {
            margin-bottom: 10px;
            color: #2E5C8A;
        }

        .info-box p {
            font-size: 0.9em;
            color: #333;
            line-height: 1.4;
        }

        /* Scrollbar styling */
        .poetry-content::-webkit-scrollbar {
            width: 10px;
        }

        .poetry-content::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .poetry-content::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 10px;
        }

        .poetry-content::-webkit-scrollbar-thumb:hover {
            background: #FFA500;
        }
    </style>
</head>
<body>
    <!-- Beach Scene -->
    <div class="scene-container" id="scene">
        <!-- Info Box -->
        <div class="info-box">
            <h3>🌊 Beach Poetry</h3>
            <p>Click on any object to reveal its hidden poem...</p>
        </div>

        <!-- Sky Elements -->
        <div class="sun" onclick="showPoem('sun')"></div>
        
        <div class="cloud cloud1" onclick="showPoem('cloud')"></div>
        
        <div class="bird" onclick="showPoem('bird')">
            <div class="bird-shape"></div>
        </div>

        <!-- Ocean -->
        <div class="ocean" onclick="showPoem('ocean')">
            <div class="wave"></div>
        </div>

        <!-- Beach Elements -->
        <div class="palm-tree" onclick="showPoem('palm')">
            <div class="leaves">
                <div class="leaf"></div>
                <div class="leaf"></div>
                <div class="leaf"></div>
                <div class="leaf"></div>
            </div>
            <div class="trunk"></div>
        </div>

        <div class="seashell" onclick="showPoem('shell')"></div>

        <div class="boat" onclick="showPoem('boat')">
            <div class="sail"></div>
            <div class="boat-body"></div>
        </div>

        <div class="sandcastle" onclick="showPoem('sandcastle')">
            <div class="castle-top"></div>
            <div class="castle-tower"></div>
        </div>
    </div>

    <!-- Poetry Panel (Hidden by default) -->
    <div class="poetry-panel" id="poetryPanel">
        <div class="poetry-content" id="poetryContent">
            <button class="close-btn" onclick="closePoem()">&times;</button>
            <div id="poemText"></div>
        </div>
    </div>

    <script>
        // Poem database (you can replace these with your actual poems)
        const poems = {
            sun: {
                title: "The Sun's Embrace",
                content: `Golden orb hanging in the azure sky,
Your warmth cascades like honey down,
Painting the world in amber light.

Eternal witness to the tides below,
You rise and fall in patient rhythm,
Teaching us the art of letting go.

[Your poem here]`
            },
            cloud: {
                title: "Whispers of Cotton",
                content: `Floating dreams in white parade,
Soft as wishes, light as breath,
You drift through endless blue.

Shape-shifting stories in the sky,
Now a dragon, now a ship,
Forever free, forever high.

[Your poem here]`
            },
            ocean: {
                title: "The Ocean's Song",
                content: `Endless depths of mystery,
Your waves compose a symphony,
Salt and foam and ancient tales.

You hold secrets in your depths,
Treasures lost and memories kept,
Forever singing, never still.

[Your poem here]`
            },
            palm: {
                title: "The Palm's Whisper",
                content: `Rooted deep in sun-kissed sand,
Your leaves dance to ocean's song,
Swaying green against the blue.

Shelter for the weary soul,
Symbol of the tropics warm,
Standing tall through storm and calm.

[Your poem here]`
            },
            shell: {
                title: "Seashell's Secret",
                content: `Spiral chamber, ocean's gift,
Pink and pearl upon the sand,
Hold the sea's voice in your hand.

Once a home, now treasure found,
Carrying whispers of the deep,
Stories that the waves repeat.

[Your poem here]`
            },
            boat: {
                title: "The Sailor's Dream",
                content: `White sail catching coastal breeze,
Cutting through the sapphire waves,
Journey to horizons far.

Freedom painted on the wind,
Adventure calling from beyond,
Where the sea meets endless sky.

[Your poem here]`
            },
            sandcastle: {
                title: "Castle of Sand",
                content: `Built by hands and washed by time,
Fragile fortress by the shore,
Dreaming towers, moat of blue.

Childhood's monument to joy,
Standing brave against the tide,
Beauty in impermanence.

[Your poem here]`
            },
            bird: {
                title: "Flight of Freedom",
                content: `Wings spread wide across the sky,
Soaring high above the waves,
Dancing with the coastal wind.

Messenger between two worlds,
Sky and sea, the earth and air,
Free as only birds can be.

[Your poem here]`
            }
        };

        // Show poem function
        function showPoem(objectName) {
            const panel = document.getElementById('poetryPanel');
            const poemText = document.getElementById('poemText');
            const poem = poems[objectName];

            if (poem) {
                poemText.innerHTML = `
                    <h2>${poem.title}</h2>
                    <p>${poem.content.replace(/\n/g, '<br>')}</p>
                    <p style="margin-top: 30px; text-align: center; font-style: italic;">
                        <span class="passage-link" onclick="closePoem()">Return to the beach</span>
                    </p>
                `;
                panel.style.display = 'flex';
            }
        }

        // Close poem function
        function closePoem() {
            const panel = document.getElementById('poetryPanel');
            panel.style.display = 'none';
        }

        // Close on Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closePoem();
            }
        });

        // Optional: Click outside to close
        document.getElementById('poetryPanel').addEventListener('click', function(event) {
            if (event.target === this) {
                closePoem();
            }
        });
    </script>
</body>
</html>
